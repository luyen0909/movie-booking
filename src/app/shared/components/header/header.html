<header style="background-color: #fff; padding: 15px 0; border-bottom: 1px solid #eee;">
  <div class="container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 15px;">
    
    <!-- LOGO -->
    <a routerLink="/" class="logo">
      <img src="../../../../assets/images/logo.png" alt="Movie Booking Logo" style="height: 50px; object-fit: contain;" />
    </a>

    <!-- SEARCH BAR -->
    <div class="search-bar" style="display: flex; background: #f5f5f5; padding: 8px 15px; border-radius: 20px;">
      <input type="text" placeholder="Tìm tên phim, rạp..." style="border: none; background: transparent; outline: none; width: 250px;">
      <button style="border: none; background: transparent; cursor: pointer;">🔍</button>
    </div>

    <!-- USER ACTIONS -->
    <div class="user-actions" style="display: flex; align-items: center; gap: 15px;">
      <a routerLink="/auth/login" style="text-decoration: none; color: #333; font-weight: 600;">Đăng nhập</a>
      <a routerLink="/auth/register" style="text-decoration: none; background: #f26b38; color: white; padding: 8px 20px; border-radius: 20px; font-weight: 600;">Đăng ký</a>
    </div>
  </div> 
</header>
