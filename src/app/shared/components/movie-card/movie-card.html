<article class="movie-card">
  <div class="movie-card__image-wrapper">
    <img [src]="movie.image" [alt]="movie.title" class="movie-card__image" loading="lazy">
    <div class="movie-card__badge" *ngIf="movie.isHot">Hot</div>
    <div class="movie-card__overlay">
      <button class="btn btn--primary">Mua Vé</button>
    </div>
  </div>
  <div class="movie-card__info">
    <h3 class="movie-card__title">{{ movie.title }}</h3>
    <span class="movie-card__rating">⭐ {{ movie.rating }}</span>
  </div>
</article>
