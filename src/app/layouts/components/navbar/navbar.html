<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="container navbar-inner">
    
    <a routerLink="/" class="logo">
      <img src="https://placehold.co/100x40/f26b38/fff?text=LOGO" alt="Movie Booking Logo" />
    </a>

    <ul class="nav-links desktop-only">
      <li><a routerLink="/movies" routerLinkActive="active">Phim</a></li>
      <li><a routerLink="/cinemas" routerLinkActive="active">Góc Điện Ảnh</a></li>
      <li><a routerLink="/showtimes" routerLinkActive="active">Sự Kiện</a></li>
      <li><a routerLink="/prices" routerLinkActive="active">Rạp/Giá Vé</a></li>
    </ul>

    <div class="nav-actions">
      <div class="search-box desktop-only">
        <input type="text" placeholder="Tìm phim, rạp...">
        <button class="btn-search">
          🔍
        </button>
      </div>

      <a routerLink="/auth/login" class="btn-login desktop-only">Đăng Nhập</a>
      
      <a routerLink="/booking" class="btn-book-ticket">Mua Vé Ngay</a>
      
      <button class="hamburger mobile-only" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <div class="mobile-menu" [class.open]="isMobileMenuOpen">
    <div class="search-box-mobile">
      <input type="text" placeholder="Tìm kiếm phim...">
    </div>
    <ul>
      <li><a routerLink="/movies" (click)="toggleMobileMenu()">Phim</a></li>
      <li><a routerLink="/cinemas" (click)="toggleMobileMenu()">Góc Điện Ảnh</a></li>
      <li><a routerLink="/showtimes" (click)="toggleMobileMenu()">Sự Kiện</a></li>
      <li><a routerLink="/prices" (click)="toggleMobileMenu()">Rạp/Giá Vé</a></li>
      <li><a routerLink="/auth/login" (click)="toggleMobileMenu()">Đăng Nhập</a></li>
    </ul>
  </div>
</nav>
