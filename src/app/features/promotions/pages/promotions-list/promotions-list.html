<div class="promotions-page dark-theme">
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">CHƯƠNG TRÌNH KHUYẾN MÃI</h1>
      <p class="page-subtitle">Cập nhật ngay những ưu đãi mới nhất từ rạp chiếu phim để không bỏ lỡ bất kỳ suất chiếu đỉnh cao nào!</p>
    </div>

    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Đang tải ưu đãi...</p>
    </div>

    <div *ngIf="!isLoading && promotions.length === 0" class="empty-state">
      <p>Hiện chưa có chương trình khuyến mãi nào.</p>
    </div>

    <div class="promo-grid" *ngIf="!isLoading && promotions.length > 0">
      <article class="promo-card" *ngFor="let promo of promotions">
        <div class="card-image-wrapper">
          <img [src]="promo.image" [alt]="promo.title">
          <div class="overlay">
            <button class="btn-detail">XEM CHI TIẾT</button>
          </div>
        </div>
        <div class="card-content">
          <h3 class="promo-title">{{ promo.title }}</h3>
          <p class="promo-desc" *ngIf="promo.description">{{ promo.description }}</p>
        </div>
      </article>
    </div>
  </div>
</div>
