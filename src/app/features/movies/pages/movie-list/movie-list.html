<div class="movie-page">
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Phim</h1>
      
      <!-- Tab chuyển đổi -->
      <div class="movie-tabs">
        <button 
          class="tab-item" 
          [class.active]="activeTab() === 'now'"
          (click)="switchTab('now')">
          Đang Chiếu
        </button>
        <button 
          class="tab-item" 
          [class.active]="activeTab() === 'coming'"
          (click)="switchTab('coming')">
          Sắp Chiếu
        </button>
      </div>
    </div>

    <!-- Grid hiển thị phim (Tái sử dụng cấu trúc Card giống Home) -->
    <div class="movie-grid">
      <article class="movie-card" *ngFor="let movie of filteredMovies()">
        <div class="card-image">
          <img [src]="movie.image" [alt]="movie.title">
          <div class="rating" *ngIf="movie.rating">{{ movie.rating }}</div>
          <div class="card-overlay">
            <button class="btn-book">Mua Vé</button>
          </div>
        </div>
        <div class="card-content">
          <h3 class="movie-title">{{ movie.title }}</h3>
          <p class="movie-genre">{{ movie.genre }}</p>
        </div>
      </article>
    </div>
  </div>
</div>
