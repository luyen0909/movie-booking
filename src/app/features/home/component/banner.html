<div class="banner-slider">
  <div class="slider-wrapper">
    
    <div 
      class="slide-item" 
      *ngFor="let slide of slides; let i = index"
      [class.active]="i === currentSlide"
    >
      <!-- Lớp nền Parallax riêng biệt -->
      <div class="slide-bg"
           [style.backgroundImage]="'url(' + slide.image + ')'"
           [style.transform]="'translate3d(0, ' + (scrollY * 0.5) + 'px, 0)'">
      </div>

      <div class="overlay-gradient"></div>
      
      <div class="container slide-content">
        <span class="badge">{{ slide.genre }}</span>
        <h2 class="movie-title">{{ slide.title }}</h2>
        <div class="meta-info">
          <span class="rating">⭐ {{ slide.rating }}</span>
          <span class="duration">2h 15m</span>
        </div>
        <p class="description">{{ slide.description }}</p>
        
        <div class="actions">
          <a routerLink="/booking" class="btn-primary">Đặt Vé Ngay</a>
          <button class="btn-outline">Xem Trailer</button>
        </div>
      </div>
    </div>

  </div>

  <div class="dots-nav">
    <span 
      *ngFor="let slide of slides; let i = index" 
      [class.active]="i === currentSlide"
      (click)="goToSlide(i)">
    </span>
  </div>
</div>
